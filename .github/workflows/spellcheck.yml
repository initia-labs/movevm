name: Spell Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  spellcheck:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
      - name: Install codespell
        run: python3 -m pip install "codespell==2.4.2"
      - name: Run codespell
        continue-on-error: true
        run: codespell -w --skip="*.git,*.so,*.dylib,*.a,*.h,*.json,*.bin,go.mod,go.sum,Cargo.toml,Cargo.lock" --ignore-words=.github/config/.codespellignore
      - uses: peter-evans/create-pull-request@v7.0.5
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: fix typos"
          title: "chore: fix typos"
          branch: "chore/fix-typos"
          delete-branch: true
          body: |
            This PR fixes typos in the codebase.
            Please review it, and merge if everything is fine.
